name: NammaTorrent

options:
  bundleIdPrefix: com
  deploymentTarget:
    iOS: "18.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: "NO"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: "NO"

targets:
  NammaTorrent:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: NammaTorrent/App
      - path: NammaTorrent/AppIntents
      - path: NammaTorrent/Components
      - path: NammaTorrent/Extensions
      - path: NammaTorrent/LiveActivities
      - path: NammaTorrent/Managers
      - path: NammaTorrent/Models
      - path: NammaTorrent/Services
      - path: NammaTorrent/TorrentEngine
      - path: NammaTorrent/Utilities
      - path: NammaTorrent/ViewModels
      - path: NammaTorrent/Views
    dependencies:
      - target: NammaTorrentWidget
        embed: true
      - target: NammaTorrentShare
        embed: true
    info:
      path: NammaTorrent/Resources/Info.plist
    entitlements:
      path: NammaTorrent/Resources/NammaTorrent.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nammatorrrent
        PRODUCT_NAME: NammaTorrent
        ASSETCATALOG_COMPILER_APPICON_NAME: ""

  NammaTorrentWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: NammaTorrent/Widgets
      - path: NammaTorrent/LiveActivities
      - path: NammaTorrent/Components/ProgressRing.swift
      - path: NammaTorrent/Components/SpeedBadge.swift
      - path: NammaTorrent/Extensions/Color+Theme.swift
      - path: NammaTorrent/Models
      - path: NammaTorrent/Utilities/Formatters.swift
    info:
      path: NammaTorrent/Resources/NammaTorrentWidget-Info.plist
    entitlements:
      path: NammaTorrent/Resources/NammaTorrentWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nammatorrrent.widget
        PRODUCT_NAME: NammaTorrentWidget
        APPLICATION_EXTENSION_API_ONLY: "YES"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) APP_EXTENSION"
        SKIP_INSTALL: "YES"
        PRODUCT_BUNDLE_PACKAGE_TYPE: XPC!

  NammaTorrentShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: NammaTorrent/ShareExtension
    info:
      path: NammaTorrent/Resources/NammaTorrentShare-Info.plist
    entitlements:
      path: NammaTorrent/Resources/NammaTorrentShare.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nammatorrrent.share
        PRODUCT_NAME: NammaTorrentShare
        APPLICATION_EXTENSION_API_ONLY: "YES"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) APP_EXTENSION"
        SKIP_INSTALL: "YES"

  NammaTorrentTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: NammaTorrent/Tests
    dependencies:
      - target: NammaTorrent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nammatorrrent.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NammaTorrent.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/NammaTorrent"
